<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!-- Body -->
  <ellipse cx="40" cy="65" rx="25" ry="28" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="40" cy="70" rx="16" ry="18" fill="#FFFFFF"/>
  <!-- Left ear -->
  <path d="M30 42 Q25 15 32 8 Q36 5 38 15 Q39 25 35 42" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5"/>
  <path d="M32 38 Q28 18 33 11 Q35 9 37 16 Q38 24 34 38" fill="#FFB4B4"/>
  <!-- Right ear -->
  <path d="M50 42 Q55 15 48 8 Q44 5 42 15 Q41 25 45 42" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5"/>
  <path d="M48 38 Q52 18 47 11 Q45 9 43 16 Q42 24 46 38" fill="#FFB4B4"/>
  <!-- Head -->
  <circle cx="40" cy="45" r="18" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Cheeks -->
  <circle cx="28" cy="48" r="4" fill="#FFB4B4" opacity="0.5"/>
  <circle cx="52" cy="48" r="4" fill="#FFB4B4" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="34" cy="42" rx="3.5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="33" cy="41" rx="1.5" ry="2" fill="white"/>
  <ellipse cx="46" cy="42" rx="3.5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="45" cy="41" rx="1.5" ry="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="40" cy="48" rx="2.5" ry="1.8" fill="#FF8FAA"/>
  <!-- Mouth -->
  <path d="M37 51 Q40 55 43 51" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="38" y="51" width="4" height="3.5" rx="1" fill="white" stroke="#2D2D2D" stroke-width="1"/>
  <!-- Feet -->
  <ellipse cx="32" cy="90" rx="10" ry="5" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2"/>
  <ellipse cx="48" cy="90" rx="10" ry="5" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2"/>
</svg>
