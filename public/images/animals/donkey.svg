<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="232" rx="45" ry="7" fill="#00000018"/>
  <!-- Body -->
  <ellipse cx="100" cy="175" rx="50" ry="52" fill="#9E9E9E" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Belly -->
  <ellipse cx="100" cy="185" rx="34" ry="32" fill="#BDBDBD"/>
  <!-- Long ears (taller than horse) -->
  <path d="M68 90 Q55 30 68 12 Q76 2 82 16 Q88 40 78 88" fill="#9E9E9E" stroke="#2D2D2D" stroke-width="3"/>
  <path d="M72 82 Q62 36 72 18 Q77 10 80 22 Q84 42 77 80" fill="#C4956A"/>
  <path d="M132 90 Q145 30 132 12 Q124 2 118 16 Q112 40 122 88" fill="#9E9E9E" stroke="#2D2D2D" stroke-width="3"/>
  <path d="M128 82 Q138 36 128 18 Q123 10 120 22 Q116 42 123 80" fill="#C4956A"/>
  <!-- Head -->
  <ellipse cx="100" cy="112" rx="34" ry="36" fill="#9E9E9E" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Snout -->
  <ellipse cx="100" cy="135" rx="24" ry="16" fill="#BDBDBD" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Eyes -->
  <ellipse cx="84" cy="106" rx="7" ry="8" fill="#2D2D2D"/>
  <ellipse cx="116" cy="106" rx="7" ry="8" fill="#2D2D2D"/>
  <circle cx="82" cy="103" r="2.5" fill="white"/>
  <circle cx="114" cy="103" r="2.5" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="90" cy="137" rx="4" ry="3" fill="#757575"/>
  <ellipse cx="110" cy="137" rx="4" ry="3" fill="#757575"/>
  <!-- Mouth — dorky grin -->
  <path d="M86 143 Q100 152 114 143" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Front hair tuft -->
  <path d="M92 80 Q98 68 100 72 Q102 68 108 80" fill="#757575" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Hooves -->
  <rect x="68" y="218" width="20" height="12" rx="6" fill="#616161" stroke="#2D2D2D" stroke-width="2.5"/>
  <rect x="112" y="218" width="20" height="12" rx="6" fill="#616161" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Arms -->
  <ellipse cx="58" cy="168" rx="10" ry="14" fill="#9E9E9E" stroke="#2D2D2D" stroke-width="2.5" transform="rotate(-15 58 168)"/>
  <ellipse cx="142" cy="168" rx="10" ry="14" fill="#9E9E9E" stroke="#2D2D2D" stroke-width="2.5" transform="rotate(15 142 168)"/>
</svg>
