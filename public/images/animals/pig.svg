<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="232" rx="45" ry="7" fill="#00000018"/>
  <!-- Body -->
  <ellipse cx="100" cy="178" rx="54" ry="50" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Belly -->
  <ellipse cx="100" cy="188" rx="36" ry="30" fill="#FFC8D1"/>
  <!-- Ears -->
  <path d="M68 98 Q56 68 66 55 Q74 46 80 58 Q86 72 78 96" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="3"/>
  <path d="M72 92 Q64 72 70 60 Q74 54 78 62 Q82 72 77 90" fill="#FF9AAF"/>
  <path d="M132 98 Q144 68 134 55 Q126 46 120 58 Q114 72 122 96" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="3"/>
  <path d="M128 92 Q136 72 130 60 Q126 54 122 62 Q118 72 123 90" fill="#FF9AAF"/>
  <!-- Head -->
  <circle cx="100" cy="112" r="37" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Snout -->
  <ellipse cx="100" cy="128" rx="20" ry="14" fill="#FF9AAF" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Nostrils -->
  <ellipse cx="92" cy="128" rx="4.5" ry="5" fill="#E87B95"/>
  <ellipse cx="108" cy="128" rx="4.5" ry="5" fill="#E87B95"/>
  <!-- Eyes -->
  <ellipse cx="84" cy="106" rx="7" ry="8" fill="#2D2D2D"/>
  <ellipse cx="116" cy="106" rx="7" ry="8" fill="#2D2D2D"/>
  <circle cx="82" cy="103" r="2.5" fill="white"/>
  <circle cx="114" cy="103" r="2.5" fill="white"/>
  <!-- Cheeks -->
  <circle cx="70" cy="118" r="8" fill="#FF9AAF" opacity="0.4"/>
  <circle cx="130" cy="118" r="8" fill="#FF9AAF" opacity="0.4"/>
  <!-- Smile -->
  <path d="M88 138 Q100 146 112 138" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Curly tail (visible from front, tiny curl above body) -->
  <path d="M100 128 Q90 127 100 126" stroke="#2D2D2D" stroke-width="0" fill="none"/>
  <!-- Hooves -->
  <ellipse cx="76" cy="222" rx="14" ry="8" fill="#FF9AAF" stroke="#2D2D2D" stroke-width="2.5"/>
  <ellipse cx="124" cy="222" rx="14" ry="8" fill="#FF9AAF" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Arms -->
  <ellipse cx="54" cy="172" rx="10" ry="14" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="2.5" transform="rotate(-15 54 172)"/>
  <ellipse cx="146" cy="172" rx="10" ry="14" fill="#FFB6C1" stroke="#2D2D2D" stroke-width="2.5" transform="rotate(15 146 172)"/>
</svg>
