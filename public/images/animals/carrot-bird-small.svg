<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!-- Body -->
  <ellipse cx="40" cy="64" rx="22" ry="24" fill="#F0F0F0" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="40" cy="68" rx="14" ry="16" fill="#FFFFFF"/>
  <!-- Head -->
  <circle cx="40" cy="38" r="16" fill="#F0F0F0" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Cheeks -->
  <circle cx="30" cy="40" r="4" fill="#FFB4B4" opacity="0.4"/>
  <circle cx="50" cy="40" r="4" fill="#FFB4B4" opacity="0.4"/>
  <!-- Eyes -->
  <ellipse cx="34" cy="35" rx="3.5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="33" cy="34" rx="1.5" ry="2" fill="white"/>
  <ellipse cx="46" cy="35" rx="3.5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="45" cy="34" rx="1.5" ry="2" fill="white"/>
  <!-- Big carrot beak -->
  <path d="M36 42 Q37 41 40 41 Q43 41 44 42 L41.5 62 Q40 64 38.5 62 Z" fill="#FF8C42" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Beak stripes -->
  <line x1="37" y1="47" x2="43" y2="47" stroke="#E87830" stroke-width="1" stroke-linecap="round"/>
  <line x1="37.5" y1="52" x2="42.5" y2="52" stroke="#E87830" stroke-width="1" stroke-linecap="round"/>
  <line x1="38" y1="57" x2="42" y2="57" stroke="#E87830" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Green leaves -->
  <path d="M37 42 Q34 36 36 33" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M40 41 Q40 35 40 32" stroke="#66BB6A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M43 42 Q46 36 44 33" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Wings -->
  <path d="M18 58 Q10 50 10 62 Q10 72 20 74" fill="#E0E0E0" stroke="#2D2D2D" stroke-width="2"/>
  <path d="M62 58 Q70 50 70 62 Q70 72 60 74" fill="#E0E0E0" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Feet -->
  <path d="M34 88 L28 94 M34 88 L34 95 M34 88 L40 94" stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M46 88 L40 94 M46 88 L46 95 M46 88 L52 94" stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round"/>
</svg>
