<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!-- Body -->
  <ellipse cx="40" cy="65" rx="24" ry="26" fill="#C4956A" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="40" cy="70" rx="15" ry="16" fill="#D4A87A"/>
  <!-- Ears -->
  <path d="M28 40 Q22 22 28 16 Q32 12 34 20 Q36 28 32 40" fill="#C4956A" stroke="#2D2D2D" stroke-width="2"/>
  <path d="M52 40 Q58 22 52 16 Q48 12 46 20 Q44 28 48 40" fill="#C4956A" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="40" cy="42" rx="17" ry="19" fill="#C4956A" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Mane tuft -->
  <path d="M34 24 Q38 18 42 22 Q46 18 48 24" fill="#8B5E3C" stroke="#2D2D2D" stroke-width="1.5"/>
