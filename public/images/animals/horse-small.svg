  <ellipse cx="40" cy="52" rx="10" ry="7" fill="#D4A87A" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Nostrils -->
  <circle cx="36" cy="52" r="2" fill="#8B5E3C"/>
  <circle cx="44" cy="52" r="2" fill="#8B5E3C"/>
