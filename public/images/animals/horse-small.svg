  <ellipse cx="33" cy="40" rx="3.5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="32" cy="39" rx="1.5" ry="2" fill="white"/>
  <ellipse cx="47" cy="40" rx="3.5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="46" cy="39" rx="1.5" ry="2" fill="white"/>
  <!-- Feet -->
  <ellipse cx="32" cy="90" rx="9" ry="5" fill="#8B5E3C" stroke="#2D2D2D" stroke-width="2"/>
  <ellipse cx="48" cy="90" rx="9" ry="5" fill="#8B5E3C" stroke="#2D2D2D" stroke-width="2"/>
</svg>
