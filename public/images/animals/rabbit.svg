<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="232" rx="45" ry="7" fill="#00000018"/>
  <!-- Body -->
  <ellipse cx="100" cy="175" rx="50" ry="55" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Belly -->
  <ellipse cx="100" cy="185" rx="32" ry="35" fill="#FFFFFF"/>
  <!-- Left ear -->
  <path d="M72 120 Q62 50 76 32 Q84 24 88 42 Q92 68 84 120" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="3"/>
  <path d="M76 112 Q68 58 78 38 Q83 33 86 44 Q89 68 83 112" fill="#FFB4B4"/>
  <!-- Right ear -->
  <path d="M128 120 Q138 50 124 32 Q116 24 112 42 Q108 68 116 120" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="3"/>
  <path d="M124 112 Q132 58 122 38 Q117 33 114 44 Q111 68 117 112" fill="#FFB4B4"/>
  <!-- Head -->
  <circle cx="100" cy="120" r="38" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="3"/>
  <!-- Cheeks -->
  <circle cx="72" cy="128" r="9" fill="#FFB4B4" opacity="0.5"/>
  <circle cx="128" cy="128" r="9" fill="#FFB4B4" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="114" rx="7" ry="8" fill="#2D2D2D"/>
  <ellipse cx="114" cy="114" rx="7" ry="8" fill="#2D2D2D"/>
  <circle cx="84" cy="111" r="2.5" fill="white"/>
  <circle cx="112" cy="111" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="126" rx="5" ry="3.5" fill="#FFB4B4"/>
  <!-- Mouth -->
  <path d="M95 130 Q100 135 105 130" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="62" y1="124" x2="82" y2="126" stroke="#2D2D2D" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="130" x2="82" y2="130" stroke="#2D2D2D" stroke-width="1.5" opacity="0.4"/>
  <line x1="118" y1="126" x2="138" y2="124" stroke="#2D2D2D" stroke-width="1.5" opacity="0.4"/>
  <line x1="118" y1="130" x2="140" y2="130" stroke="#2D2D2D" stroke-width="1.5" opacity="0.4"/>
  <!-- Feet -->
  <ellipse cx="78" cy="224" rx="16" ry="8" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5"/>
  <ellipse cx="122" cy="224" rx="16" ry="8" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5"/>
  <!-- Arms/paws -->
  <ellipse cx="58" cy="170" rx="10" ry="14" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5" transform="rotate(-15 58 170)"/>
  <ellipse cx="142" cy="170" rx="10" ry="14" fill="#F5F0E8" stroke="#2D2D2D" stroke-width="2.5" transform="rotate(15 142 170)"/>
  <!-- Buck teeth -->
  <rect x="94" y="131" width="5" height="6" rx="1.5" fill="white" stroke="#2D2D2D" stroke-width="1"/>
  <rect x="101" y="131" width="5" height="6" rx="1.5" fill="white" stroke="#2D2D2D" stroke-width="1"/>
</svg>
